name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Use standalone package.json
        working-directory: artifacts/hotdog-van
        run: cp package.gh-pages.json package.json

      - name: Install dependencies
        working-directory: artifacts/hotdog-van
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: artifacts/hotdog-van
        run: npm run build

      - name: List dist
        working-directory: artifacts/hotdog-van
        run: ls -la dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/hotdog-van/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
